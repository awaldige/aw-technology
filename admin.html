<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AW TECHNOLOGY | Painel ADM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Trava visual para o modo demo */
        .is-demo #btn-new-product, 
        .is-demo .btn-delete,
        .is-demo .btn-edit-trigger { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        /* Estilo para Tabela vira Card no Mobile */
        @media (max-width: 768px) {
            #admin-table-header { display: none; }
            #product-list { display: grid; grid-template-columns: 1fr; gap: 1rem; padding: 0.5rem; }
            #product-list tr { 
                display: flex; flex-direction: column; 
                background: #1f2937; border: 1px solid #374151; 
                border-radius: 1.25rem; padding: 1.25rem; position: relative;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            #product-list td { display: block; padding: 0.25rem 0; border: none !important; }
            .actions-cell { 
                position: absolute; top: 0.75rem; right: 0.75rem; 
                background: rgba(17, 24, 39, 0.8); border-radius: 1rem; padding: 0.25rem !important;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased overflow-x-hidden">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-gray-800 border-r border-gray-700 hidden md:flex flex-col sticky top-0 h-screen">
            <div class="p-8">
                <h1 class="text-2xl font-black tracking-tighter italic">
                    <span class="text-white">AW</span> <span class="text-blue-500">TEC</span>
                </h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mt-1 font-bold">Admin Panel</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/20">
                    <span class="mr-3 text-lg">📦</span> Produtos
                </a>
                <a href="index.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-700 hover:text-white rounded-xl transition">
                    <span class="mr-3 text-lg">🌐</span> Ver Vitrine
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700">
                <button onclick="logoutAdmin()" class="flex items-center w-full px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl transition font-bold">
                    <span class="mr-3">🚪</span> Sair
                </button>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-10 w-full">
            <div class="md:hidden flex justify-between items-center mb-6 bg-gray-800 p-4 rounded-2xl border border-gray-700 shadow-lg">
                <h1 class="text-lg font-black italic">AW <span class="text-blue-500">TEC</span></h1>
                <div class="flex gap-2">
                    <a href="index.html" class="bg-gray-900 p-2 rounded-lg text-sm font-bold">🌐</a>
                    <button onclick="logoutAdmin()" class="bg-red-500/10 p-2 rounded-lg text-red-400 text-sm font-bold">Logout</button>
                </div>
            </div>

            <div id="demo-banner" class="hidden mb-6 bg-blue-600 text-white p-4 rounded-2xl shadow-xl border border-blue-400/30">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 p-2 rounded-lg text-xl">🚀</div>
                    <div>
                        <h4 class="font-black text-xs uppercase tracking-widest leading-none mb-1">Modo Demonstração</h4>
                        <p class="text-[10px] opacity-90 font-medium italic">Login como Convidado. Edição bloqueada.</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                <div>
                    <h2 class="text-3xl md:text-4xl font-black italic tracking-tighter">Painel de <span class="text-blue-500">Controle</span></h2>
                    <p class="text-gray-500 text-xs mt-1 uppercase tracking-widest font-bold">Inventário AW Technology</p>
                </div>
                <button id="btn-new-product" onclick="openModal()" class="w-full md:w-auto bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-2xl font-black transition-all flex justify-center items-center gap-2 shadow-lg shadow-green-600/20 active:scale-95">
                    <span>+</span> NOVO PRODUTO
                </button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                <div class="bg-gray-800/50 border border-gray-700 p-6 rounded-3xl border-l-4 border-l-blue-500">
                    <p class="text-gray-500 text-[9px] uppercase tracking-[0.2em] font-black mb-1">Itens</p>
                    <h3 id="stat-total-items" class="text-3xl font-black italic">0</h3>
                </div>
                <div class="bg-gray-800/50 border border-gray-700 p-6 rounded-3xl border-l-4 border-l-green-500">
                    <p class="text-gray-500 text-[9px] uppercase tracking-[0.2em] font-black mb-1">Total</p>
                    <h3 id="stat-total-value" class="text-lg md:text-2xl font-black italic text-green-400 truncate">R$ 0</h3>
                </div>
                <div class="bg-gray-800/50 border border-gray-700 p-6 rounded-3xl border-l-4 border-l-purple-500 col-span-2 md:col-span-1">
                    <p class="text-gray-500 text-[9px] uppercase tracking-[0.2em] font-black mb-1">Média</p>
                    <h3 id="stat-avg-price" class="text-lg md:text-2xl font-black italic text-purple-400 truncate">R$ 0</h3>
                </div>
            </div>

            <div class="bg-gray-800/30 md:bg-gray-800 rounded-3xl border border-gray-700 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead id="admin-table-header" class="bg-gray-700/50 text-gray-400 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="p-6">Produto & Descrição</th>
                            <th class="p-6 text-center">Preço</th>
                            <th class="p-6 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="product-list" class="divide-y divide-gray-700/50">
                        <tr><td colspan="3" class="p-20 text-center text-gray-500 font-bold italic animate-pulse tracking-widest">SINCRONIZANDO DATABASE...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[100] p-4 backdrop-blur-md">
        <div class="bg-gray-800 border border-gray-700 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-gray-700/30 p-6 text-center border-b border-gray-700">
                <h3 id="modal-title" class="text-xl font-black italic uppercase tracking-tighter">Configurar Item</h3>
            </div>
            <form id="product-form" class="p-6 md:p-8 space-y-4">
                <input type="hidden" id="product-id">
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-black text-gray-500 tracking-widest ml-1">Nome do Hardware</label>
                    <input type="text" id="name" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 outline-none text-white focus:border-blue-500 transition-all font-bold" placeholder="Ex: RTX 4090 Rog Strix" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-black text-gray-500 tracking-widest ml-1">Preço (BRL)</label>
                    <input type="number" id="price" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 outline-none text-white focus:border-blue-500 transition-all font-bold" placeholder="0.00" required>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-black text-gray-500 tracking-widest ml-1">URL da Imagem</label>
                    <input type="url" id="image" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 outline-none text-white focus:border-blue-500 transition-all text-xs" placeholder="https://...">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-black text-gray-500 tracking-widest ml-1">Especificações</label>
                    <textarea id="description" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-4 outline-none text-white resize-none focus:border-blue-500 transition-all text-sm" placeholder="Detalhes técnicos..."></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-700 py-4 rounded-2xl font-bold hover:bg-gray-600 transition-all uppercase text-xs tracking-widest">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-2xl font-black hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20 uppercase text-xs tracking-widest">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const isAdmin = localStorage.getItem('aw_admin_auth') === 'true';
        const isGuest = localStorage.getItem('aw_guest_demo') === 'true';

        if (!isAdmin && !isGuest) { window.location.href = 'index.html'; }

        if (isGuest && !isAdmin) {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('is-demo');
                document.getElementById('demo-banner').classList.remove('hidden');
            });
        }

        const supabaseUrl = 'https://jlfjlzogrmsolgwisuvs.supabase.co'; 
        const supabaseKey = 'sb_publishable_0J6zv-geHQnKUkL9AzCrNQ_BN7tCTTr';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let products = [];

        async function loadProducts() {
            try {
                const { data, error } = await sb.from('products').select('*').order('id', { ascending: false });
                if (error) throw error;
                products = data || [];
                renderTable();
                updateStats();
            } catch (err) { console.error("Erro:", err.message); }
        }

        function renderTable() {
            const list = document.getElementById('product-list');
            if (!list) return;
            
            list.innerHTML = products.map(p => `
                <tr class="hover:bg-gray-700/20 transition-all">
                    <td class="p-4 md:p-6">
                        <div class="flex items-center gap-4">
                            <img src="${p.image}" class="w-12 h-12 md:w-14 md:h-14 object-contain bg-white rounded-xl p-2 shadow-inner" onerror="this.src='https://placehold.co/100?text=HW'">
                            <div class="min-w-0">
                                <p class="font-black text-sm md:text-base text-white truncate leading-tight">${p.name}</p>
                                <p class="text-[10px] md:text-xs text-gray-500 font-medium truncate mt-1">${p.description || 'S/ Descrição'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 md:p-6 md:text-center">
                        <div class="flex flex-col md:items-center">
                            <span class="text-[9px] md:hidden text-gray-600 font-black uppercase mb-1">Valor Unitário</span>
                            <span class="font-black text-blue-400 text-sm md:text-lg italic">R$ ${Number(p.price).toLocaleString('pt-br', {minimumFractionDigits: 2})}</span>
                        </div>
                    </td>
                    <td class="p-4 md:p-6 actions-cell">
                        <div class="flex justify-center items-center gap-3">
                            <button onclick="editProduct(${p.id})" class="p-3 bg-gray-900/50 hover:bg-blue-600/20 text-blue-400 rounded-xl transition-all btn-edit-trigger">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="p-3 bg-gray-900/50 hover:bg-red-600/20 text-red-400 rounded-xl transition-all btn-delete">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const total = products.reduce((acc, p) => acc + (Number(p.price) || 0), 0);
            const avg = products.length ? total / products.length : 0;
            
            document.getElementById('stat-total-items').innerText = products.length;
            document.getElementById('stat-total-value').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            document.getElementById('stat-avg-price').innerText = `R$ ${avg.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        window.openModal = () => { 
            if (isGuest && !isAdmin) return;
            document.getElementById('product-form').reset(); 
            document.getElementById('product-id').value = ''; 
            document.getElementById('modal-title').innerText = "Adicionar Hardware";
            document.getElementById('modal').classList.replace('hidden', 'flex'); 
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');

        window.editProduct = (id) => {
            if (isGuest && !isAdmin) return;
            const p = products.find(x => x.id == id);
            if (!p) return;
            document.getElementById('modal-title').innerText = "Editar Especificações";
            document.getElementById('product-id').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('price').value = p.price;
            document.getElementById('image').value = p.image;
            document.getElementById('description').value = p.description;
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.deleteProduct = async (id) => {
            if (isGuest && !isAdmin) return;
            if (!confirm("Remover este item do inventário?")) return;
            await sb.from('products').delete().eq('id', id);
            loadProducts();
        };

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            if (isGuest && !isAdmin) return;
            const id = document.getElementById('product-id').value;
            const data = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                image: document.getElementById('image').value,
                description: document.getElementById('description').value
            };
            if (id) await sb.from('products').update(data).eq('id', id);
            else await sb.from('products').insert([data]);
            closeModal();
            loadProducts();
        };

        window.logoutAdmin = () => { 
            localStorage.removeItem('aw_admin_auth'); 
            localStorage.removeItem('aw_guest_demo'); 
            window.location.href = 'index.html'; 
        };

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
