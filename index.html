<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AW TECHNOLOGY - Elite hardware e engenharia de performance para o seu setup.">
    <title>AW TECHNOLOGY | Premium Hardware</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Classe controlada pelo script.js para exibir elementos administrativos */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: inline-block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
        
        .card-premium {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-premium:hover { 
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); 
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.5);
        }

        @keyframes pulse-bg {
            0%, 100% { background-color: #1e293b; }
            50% { background-color: #334155; }
        }
        .skeleton { animation: pulse-bg 2s infinite ease-in-out; }

        .product-img-container {
            aspect-ratio: 16 / 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow: hidden;
            border-radius: 0.75rem;
        }
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-x-hidden">
    
    <header class="bg-gray-900/80 backdrop-blur-xl sticky top-0 z-50 py-4 border-b border-gray-800">
        <div class="container mx-auto flex items-center justify-between px-4">
            <h1 id="admin-logo" class="text-xl md:text-2xl font-extrabold tracking-tighter cursor-pointer select-none active:scale-95 transition-transform">
                <span class="text-white">AW</span> <span class="text-blue-500">TECHNOLOGY</span>
            </h1>
            
            <nav class="hidden md:block">
                <ul class="flex space-x-8 text-sm font-medium items-center">
                    <li><a href="#" class="transition hover:text-blue-400">Home</a></li>
                    <li><a href="#product-grid-section" class="transition hover:text-blue-400 text-gray-300">Produtos</a></li>
                    <li><a href="admin.html" class="admin-only transition text-blue-500 hover:text-blue-400 font-bold border border-blue-500/30 px-3 py-1 rounded-lg italic">Painel ADM</a></li>
                    <li class="relative ml-4">
                        <button id="cart-btn" aria-label="Ver Carrinho" class="p-2 bg-gray-800 rounded-full hover:bg-blue-600 transition relative group">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-500 text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-gray-900">0</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <div class="flex items-center gap-2 md:hidden">
                <button id="cart-btn-mobile-trigger" aria-label="Ver Carrinho Mobile" class="p-2 bg-gray-800 rounded-full relative active:scale-90 transition-transform">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span id="cart-count-mobile" class="absolute -top-1 -right-1 bg-blue-500 text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                </button>
                <button id="menu-btn" aria-label="Abrir Menu" class="text-white p-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div id="menu-overlay" class="fixed inset-0 bg-black/60 opacity-0 pointer-events-none z-[55] backdrop-blur-sm transition-opacity duration-300"></div>

    <aside id="mobile-menu" class="fixed inset-y-0 right-0 w-72 bg-gray-950 z-[60] translate-x-full transition-transform duration-300 border-l border-gray-800 shadow-2xl">
        <div class="flex justify-between items-center p-6 border-b border-gray-800">
            <span class="font-bold text-blue-500 tracking-widest text-sm">NAVEGAÇÃO</span>
            <button id="close-btn" class="text-gray-400 hover:text-white text-3xl">&times;</button>
        </div>
        <ul class="flex flex-col p-6 space-y-4">
            <li><a href="#" class="mobile-link block p-4 bg-gray-900/50 hover:bg-gray-800 rounded-xl transition">Home</a></li>
            <li><a href="#product-grid-section" class="mobile-link block p-4 bg-gray-900/50 hover:bg-gray-800 rounded-xl transition">Produtos</a></li>
            <li><a href="admin.html" class="admin-only mobile-link block p-4 text-blue-500 font-bold border border-blue-500/20 rounded-xl">Painel ADM</a></li>
        </ul>
    </aside>

    <script src="script.js"></script>
</body>
</html>
