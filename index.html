<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AW TECHNOLOGY</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { scroll-behavior: smooth; }
        .no-scroll { overflow: hidden; }

        .product-img-container {
            aspect-ratio: 16 / 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow: hidden;
        }

        /* ✅ CORREÇÃO MOBILE */
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>

<body class="bg-gray-900 text-white overflow-x-hidden">

<header class="bg-gray-800 sticky top-0 z-50 py-4">
    <div class="container mx-auto flex justify-between px-4">
        <h1 class="font-bold">AW TECHNOLOGY</h1>

        <button id="cart-btn" class="relative">
            🛒 <span id="cart-count" class="text-xs">0</span>
        </button>
    </div>
</header>

<main class="container mx-auto px-4 py-10">
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</main>

<footer class="text-center py-10">
    <div class="flex justify-center gap-6 mb-4">
        <a href="#" class="social-link" data-rede="Instagram">Instagram</a>
        <a href="#" class="social-link" data-rede="WhatsApp">WhatsApp</a>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
